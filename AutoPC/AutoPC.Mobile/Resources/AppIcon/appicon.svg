<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#111126"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#b44dff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  <!-- Diamond shape -->
  <polygon points="256,80 432,256 256,432 80,256" fill="none" stroke="url(#iconGrad)" stroke-width="12"/>
  <!-- Inner diamond -->
  <polygon points="256,140 372,256 256,372 140,256" fill="url(#iconGrad)" opacity="0.15"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="40" fill="url(#iconGrad)" opacity="0.9"/>
  <!-- Corner accents -->
  <circle cx="256" cy="80" r="8" fill="#00f0ff"/>
  <circle cx="432" cy="256" r="8" fill="#00f0ff"/>
  <circle cx="256" cy="432" r="8" fill="#b44dff"/>
  <circle cx="80" cy="256" r="8" fill="#b44dff"/>
</svg>
