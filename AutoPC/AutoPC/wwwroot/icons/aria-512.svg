<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161633"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="135" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.25"/>
  <!-- Diamond glyph -->
  <polygon points="256,96 366,256 256,416 146,256" fill="none" stroke="#00f0ff" stroke-width="5" filter="url(#glow)"/>
  <!-- Inner diamond -->
  <polygon points="256,150 330,256 256,362 182,256" fill="#00f0ff" opacity="0.15"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#00f0ff" filter="url(#glow)"/>
  <!-- ARIA text -->
  <text x="256" y="475" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="36" fill="#00f0ff" opacity="0.8">ARIA</text>
</svg>
